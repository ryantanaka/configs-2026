# ============================================================
# tmux.conf — opinionated starter config
# Drop this at ~/.tmux.conf and reload with: tmux source-file ~/.tmux.conf
# ============================================================


# ── Prefix ───────────────────────────────────────────────────
# Ctrl+a is way easier to reach than Ctrl+b
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # press Ctrl+a twice to send literal Ctrl+a


# ── Reload ───────────────────────────────────────────────────
# prefix + r reloads this file instantly
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"


# ── True Color & Terminal ────────────────────────────────────
# These two lines fix 99% of color issues with vim/neovim in tmux
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Fix undercurl support (for LSP squiggles in neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Reduce escape delay (critical for vim — default 500ms makes Esc laggy)
set -sg escape-time 10


# ── Mouse ────────────────────────────────────────────────────
# Click panes to focus, drag borders to resize, scroll to scroll
set -g mouse on


# ── Splits (intuitive keys) ─────────────────────────────────
# | and - are way easier to remember than % and "
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows also open in current directory
bind c new-window -c "#{pane_current_path}"


# ── Pane Navigation ─────────────────────────────────────────
# Alt + arrow keys to switch panes WITHOUT prefix
# This is the single most convenient rebind — no prefix needed
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Vim-style pane navigation with prefix (if you prefer hjkl)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# ── Pane Resizing ────────────────────────────────────────────
# Shift + arrow keys to resize panes (no prefix needed)
bind -n S-Left  resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Up    resize-pane -U 1
bind -n S-Down  resize-pane -D 1

# Bigger jumps with prefix + Shift + arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# ── Window Navigation ───────────────────────────────────────
# Shift + Alt + left/right to switch windows without prefix
bind -n M-S-Left  previous-window
bind -n M-S-Right next-window

# Swap window positions
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1


# ── Numbering ────────────────────────────────────────────────
# Start at 1 (0 is far from the prefix key on the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed (no gaps)
set -g renumber-windows on


# ── Scrollback ───────────────────────────────────────────────
set -g history-limit 50000


# ── Copy Mode (vi-style) ────────────────────────────────────
# Use vim keys in copy mode (prefix + [ to enter)
setw -g mode-keys vi

# v to start selection, y to copy (like vim)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Copy to macOS clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Double-click selects a word, triple-click selects a line
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"


# ── Windows & Naming ────────────────────────────────────────
# Don't let programs rename your windows
set -g allow-rename off
set -g automatic-rename off

# Activity monitoring (subtle highlight on windows with new output)
setw -g monitor-activity on
set -g visual-activity off


# ── Status Bar ───────────────────────────────────────────────
# Clean, minimal status bar
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# Muted colors — customize these hex values to match your terminal theme
set -g status-style "bg=#1e1e2e,fg=#6c7086"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=#cdd6f4,bold] #S #[fg=#45475a]│ "

# Right: date and time
set -g status-right-length 50
set -g status-right "#[fg=#6c7086] %b %d  %H:%M "

# Window tabs in status bar
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#cdd6f4,bg=#45475a,bold] #I:#W "
setw -g window-status-activity-style "fg=#f9e2af"

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"


# ── Quality of Life ──────────────────────────────────────────
# Don't exit tmux when the last session is killed — switch to another
set -g detach-on-destroy off

# Focus events (needed for vim autoread to work inside tmux)
set -g focus-events on

# Faster key repetition
set -g repeat-time 300

# Quick pane cycling with prefix + Tab
bind Tab last-pane

# Quick window cycling with prefix + Space
bind Space last-window

# Kill pane without confirmation
bind x kill-pane

# Break pane into its own window
bind b break-pane

# Join a pane from another window (prefix + J, then pick window number)
bind M-j command-prompt -p "join pane from:" "join-pane -s '%%'"

# Fuzzy switch session
bind S display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs tmux switch-client -t"

# Fuzzy switch window (across all sessions)
bind W display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --reverse | cut -d' ' -f1 | xargs tmux switch-client -t"

# Toggle last session
bind ` switch-client -l

# Create new session while in current session
bind N command-prompt -p "new session name:" "new-session -s '%%'"
